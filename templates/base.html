<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}设计系统{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            color: #111;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .navbar {
            background: #000;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar h1 {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        
        .card {
            background: #fff;
            border: 1px solid #eee;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        
        .btn {
            padding: 0.8rem 1.8rem;
            border: 1px solid #111;
            background: #111;
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #333;
        }
        
        .btn-primary {
            background: #111;
        }
        
        .btn-primary:hover {
            background: #333;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid #ccc;
            color: #333;
        }
        
        .btn-secondary:hover {
            border-color: #111;
            background: #f5f5f5;
        }
        
        .btn-danger {
            background: #111;
            color: white;
            border: none;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 400;
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            background: #fafafa;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #111;
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        
        .image-card {
            background: #fff;
            border: 1px solid #eee;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .image-card:hover {
            border-color: #111;
        }
        
        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .image-card .info {
            padding: 1rem;
        }
        
        .image-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        
        .tag {
            background: #f5f5f5;
            padding: 0.25rem 0.6rem;
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 0.03em;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #999;
            font-size: 0.9rem;
        }
        
        .spinner {
            border: 2px solid #eee;
            border-top: 2px solid #111;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #fff;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #111;
            color: #fff;
            padding: 1rem 1.5rem;
            font-size: 0.85rem;
            display: none;
            z-index: 1001;
        }
        
        .toast.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <h1>Design Studio</h1>
        <div class="nav-links">
            <a href="/?lang=zh" class="{% if lang == 'zh' %}active{% endif %}">中文</a>
            <a href="/?lang=en" class="{% if lang == 'en' or not lang %}active{% endif %}">EN</a>
            <span style="color: #444; margin: 0 0.5rem;">|</span>
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">{% if lang == 'zh' %}首页{% else %}Home{% endif %}</a>
            <a href="/library" class="{% if request.path == '/library' %}active{% endif %}">{% if lang == 'zh' %}图片库{% else %}Library{% endif %}</a>
            <a href="/design" class="{% if request.path == '/design' %}active{% endif %}">{% if lang == 'zh' %}设计{% else %}Design{% endif %}</a>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }
        
        async function apiCall(url, options = {}) {
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                showToast('请求失败: ' + error.message);
                throw error;
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
