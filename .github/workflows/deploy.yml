name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Build static site
        run: |
          # 创建输出目录
          mkdir -p _site
          
          # 复制静态资源（保持目录结构）
          cp -r static/* _site/ 2>/dev/null || true
          
          # 复制数据文件
          mkdir -p _site/data
          cp data/images.json _site/data/ 2>/dev/null || true
          
          # 复制上传的图片
          mkdir -p _site/uploads
          cp -r static/uploads/* _site/uploads/ 2>/dev/null || true
          
          # 创建 index.html（重定向到图片库）
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta http-equiv="refresh" content="0; url=library_static.html">
              <title>Design Studio - Fashion Image Library</title>
          </head>
          <body>
              <p>Redirecting to <a href="library_static.html">Image Library</a>...</p>
          </body>
          </html>
          EOF
          
          echo "Build complete. Files in _site:"
          ls -la _site/
          echo "---"
          echo "Data files:"
          ls -la _site/data/ 2>/dev/null || echo "No data files"
          echo "---"
          echo "Upload files count:"
          ls -1 _site/uploads/ 2>/dev/null | wc -l
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
