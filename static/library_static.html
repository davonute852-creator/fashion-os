<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片库 - Fashion Design Studio</title>
    <!-- Version: 2026.03.28.001 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 0.1em;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filters input, .filters select {
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .filters input:focus, .filters select:focus {
            border-color: #667eea;
        }
        
        .filters input {
            flex: 1;
            min-width: 200px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .image-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        
        .image-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        
        .image-info {
            padding: 20px;
        }
        
        .image-info h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .image-info .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        
        .tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }
        
        .image-info .date {
            font-size: 12px;
            color: #999;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 18px;
        }
        
        .empty {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 18px;
        }
        
        .stats {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            color: white;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }
            
            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 图片库</h1>
            <p>Fashion Design Studio - 服装设计图片收藏</p>
        </header>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalImages">0</div>
                <div class="stat-label">总图片数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalCategories">0</div>
                <div class="stat-label">分类数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="lastUpdate">-</div>
                <div class="stat-label">最后更新</div>
            </div>
        </div>
        
        <div class="filters">
            <input type="text" id="searchInput" placeholder="搜索图片..." oninput="filterImages()">
            <select id="categoryFilter" onchange="filterImages()">
                <option value="">全部分类</option>
                <option value="服装">服装</option>
                <option value="配饰">配饰</option>
                <option value="面料">面料</option>
                <option value="其他">其他</option>
            </select>
        </div>
        
        <div id="gallery" class="gallery">
            <div class="loading">正在加载图片...</div>
        </div>
    </div>
    
    <script>
        let allImages = [];
        
        // 加载图片数据
        async function loadImages() {
            try {
                // 从 images.json 加载数据（支持本地和GitHub Pages两种路径）
                let response;
                try {
                    // 先尝试相对路径（本地开发）
                    response = await fetch('../data/images.json');
                } catch (e) {
                    // 失败则尝试根路径（GitHub Pages）
                    response = await fetch('data/images.json');
                }
                
                if (!response.ok) {
                    throw new Error('Failed to load images: ' + response.status);
                }
                allImages = await response.json();
                
                // 按时间倒序排列
                allImages.sort((a, b) => new Date(b.uploaded_at) - new Date(a.uploaded_at));
                
                updateStats();
                renderImages(allImages);
            } catch (error) {
                console.error('Error loading images:', error);
                document.getElementById('gallery').innerHTML = 
                    '<div class="empty">暂无图片，请使用飞书机器人 /采集 命令添加图片</div>';
            }
        }
        
        // 更新统计信息
        function updateStats() {
            document.getElementById('totalImages').textContent = allImages.length;
            
            const categories = new Set(allImages.map(img => img.category).filter(Boolean));
            document.getElementById('totalCategories').textContent = categories.size;
            
            if (allImages.length > 0) {
                const lastDate = new Date(allImages[0].uploaded_at);
                document.getElementById('lastUpdate').textContent = 
                    lastDate.toLocaleDateString('zh-CN');
            }
        }
        
        // 渲染图片
        function renderImages(images) {
            const gallery = document.getElementById('gallery');
            
            if (images.length === 0) {
                gallery.innerHTML = '<div class="empty">没有找到匹配的图片</div>';
                return;
            }
            
            gallery.innerHTML = images.map(image => {
                // 尝试多种图片路径
                const imgSrc = image.filename ? `uploads/${image.filename}` : (image.path || image.url || '');
                return `
                <div class="image-card" onclick="viewImage('${image.filename || ''}')">
                    <img src="${imgSrc}" 
                         alt="${image.title || image.original_name || '图片'}" 
                         loading="lazy"
                         onerror="this.onerror=null; this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22280%22><rect fill=%22%23f0f0f0%22 width=%22100%25%22 height=%22100%25%22/><text fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22>图片加载失败</text></svg>'">
                    <div class="image-info">
                        <h3>${image.title || image.original_name || '未命名图片'}</h3>
                        <div class="tags">
                            ${(image.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                            ${image.category ? `<span class="tag">${image.category}</span>` : ''}
                        </div>
                        <div class="date">${image.uploaded_at ? new Date(image.uploaded_at).toLocaleDateString('zh-CN') : '-'}</div>
                    </div>
                </div>
            `}).join('');
        }
        
        // 过滤图片
        function filterImages() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            
            const filtered = allImages.filter(image => {
                const matchesSearch = !searchTerm || 
                    (image.title && image.title.toLowerCase().includes(searchTerm)) ||
                    (image.original_name && image.original_name.toLowerCase().includes(searchTerm)) ||
                    (image.tags && image.tags.some(tag => tag.toLowerCase().includes(searchTerm)));
                
                const matchesCategory = !category || image.category === category;
                
                return matchesSearch && matchesCategory;
            });
            
            renderImages(filtered);
        }
        
        // 查看大图
        function viewImage(filename) {
            window.open(`uploads/${filename}`, '_blank');
        }
        
        // 页面加载时执行
        loadImages();
    </script>
</body>
</html>
